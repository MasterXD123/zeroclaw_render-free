[skill]
name = "watchdog"
description = "Monitorea y reinicia servicios automáticamente. Detecta caídas y recovery automático."
version = "2.0.0"
author = "zeroclaw"
tags = ["monitoring", "auto-restart", "recovery", "health"]

[[tools]]
name = "check_gateway"
description = "Check zeroclaw gateway health"
kind = "shell"
command = "curl -s -o /dev/null -w '%{http_code}' http://localhost:${PORT:-42617}/health"

[[tools]]
name = "check_gateway_verbose"
description = "Check zeroclaw gateway health with response details"
kind = "shell"
command = "curl -s http://localhost:${PORT:-42617}/health"

[[tools]]
name = "ps_zeroclaw"
description = "Check if zeroclaw process is running"
kind = "shell"
command = "ps aux | grep -v grep | grep zeroclaw || echo 'Process not found'"

[[tools]]
name = "get_container_status"
description = "Get container status from /proc"
kind = "shell"
command = "cat /proc/1/status | grep -E 'State|PPid'"

[[tools]]
name = "disk_check"
description = "Check available disk space"
kind = "shell"
command = "df -h / | tail -1"

[[tools]]
name = "memory_check"
description = "Check available memory"
kind = "shell"
command = "free -m | grep Mem"

[[tools]]
name = "uptime_check"
description = "Check system uptime"
kind = "shell"
command = "uptime"

[[tools]]
name = "health_status"
description = "Get comprehensive health status"
kind = "shell"
command = "echo '=== Health Check ===' && curl -s http://localhost:${PORT:-42617}/health && echo '' && echo '=== Process ===' && ps aux | grep -v grep | grep zeroclaw || echo 'NOT RUNNING'"