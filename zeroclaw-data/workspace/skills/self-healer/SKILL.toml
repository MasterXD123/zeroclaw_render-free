[skill]
name = "self-healer"
description = "Auto-curación del sistema. Detecta y repara problemas automáticamente."
version = "2.0.0"
author = "zeroclaw"
tags = ["auto-healing", "self-repair", "health"]

[[tools]]
name = "check_gateway"
description = "Check gateway health"
kind = "shell"
command = "docker exec zeroclaw-enterprise curl -s http://localhost:42617/health"

[[tools]]
name = "check_qdrant"
description = "Check qdrant health"
kind = "shell"
command = "docker exec zeroclaw-enterprise curl -s http://localhost:6333/collections"

[[tools]]
name = "docker_stats"
description = "Docker container stats"
kind = "shell"
command = "docker stats --no-stream"

[[tools]]
name = "docker_restart"
description = "Restart zeroclaw container"
kind = "shell"
command = "docker restart zeroclaw-enterprise"

[[tools]]
name = "restart_qdrant"
description = "Restart qdrant container"
kind = "shell"
command = "docker restart zeroclaw-qdrant"

[[tools]]
name = "get_logs"
description = "Get zeroclaw logs"
kind = "shell"
command = "docker logs zeroclaw-enterprise --tail=30"

[[tools]]
name = "disk_space"
description = "Check disk space"
kind = "shell"
command = "docker exec zeroclaw-enterprise df -h"

[[tools]]
name = "memory_info"
description = "Check memory usage"
kind = "shell"
command = "docker exec zeroclaw-enterprise free -m"
