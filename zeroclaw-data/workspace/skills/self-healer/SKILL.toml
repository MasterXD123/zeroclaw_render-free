[skill]
name = "self-healer"
description = "Auto-curación del sistema. Detecta y repara problemas automáticamente."
version = "2.0.0"
author = "zeroclaw"
tags = ["auto-healing", "self-repair", "health"]

[[tools]]
name = "health_check"
description = "Comprehensive health check of all services"
kind = "shell"
command = "curl -s http://localhost:${PORT:-42617}/health || echo 'FAILED'"

[[tools]]
name = "check_gateway"
description = "Check gateway health"
kind = "shell"
command = "curl -s -o /dev/null -w '%{http_code}' http://localhost:${PORT:-42617}/health"

[[tools]]
name = "system_resources"
description = "Check system resource usage"
kind = "shell"
command = "echo '=== CPU ===' && top -bn1 | head -5 && echo '=== Memory ===' && free -m && echo '=== Disk ===' && df -h"

[[tools]]
name = "process_status"
description = "Check zeroclaw process status"
kind = "shell"
command = "ps aux | grep -v grep | grep zeroclaw || echo 'ZEROCLAW NOT RUNNING'"

[[tools]]
name = "container_health"
description = "Check container health from /proc"
kind = "shell"
command = "cat /proc/1/status | grep -E 'State|PPid|Name'"

[[tools]]
name = "disk_space"
description = "Check disk space"
kind = "shell"
command = "df -h"

[[tools]]
name = "memory_info"
description = "Check memory usage"
kind = "shell"
command = "free -m"

[[tools]]
name = "system_logs"
description = "Get recent system logs"
kind = "shell"
command = "dmesg | tail -20 || journalctl -n 20 || echo 'Logs not available'"

[[tools]]
name = "auto_heal"
description = "Attempt automatic healing (notify user)"
kind = "shell"
command = "echo 'Auto-heal triggered: Container will restart automatically on Render. For manual restart, use Render Dashboard or API.'"

[[tools]]
name = "diagnose"
description = "Run full system diagnosis"
kind = "shell"
command = "echo '=== DIAGNOSIS ===' && echo 'Gateway:' && curl -s http://localhost:${PORT:-42617}/health && echo '' && echo 'Process:' && ps aux | grep -v grep | grep zeroclaw && echo '' && echo 'Memory:' && free -m && echo '' && echo 'Disk:' && df -h"