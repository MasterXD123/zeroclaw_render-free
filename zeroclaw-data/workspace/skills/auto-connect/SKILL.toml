[skill]
name = "auto-connect"
description = "Conecta servicios automáticamente. Valida tokens y verifica conexiones."
version = "2.0.0"
author = "zeroclaw"
tags = ["setup", "connection", "automation"]

[[tools]]
name = "test_telegram"
description = "Test telegram bot"
kind = "shell"
command = "curl -s https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/getMe"

[[tools]]
name = "test_gateway"
description = "Test zeroclaw gateway"
kind = "shell"
command = "curl -s http://localhost:${PORT:-42617}/health"

[[tools]]
name = "test_api_key"
description = "Test OpenRouter API key"
kind = "shell"
command = "curl -s -H 'Authorization: Bearer $OPENAI_API_KEY' https://openrouter.ai/api/v1/models"

[[tools]]
name = "test_internet"
description = "Test internet connectivity"
kind = "shell"
command = "curl -s -o /dev/null -w '%{http_code}' https://openrouter.ai"