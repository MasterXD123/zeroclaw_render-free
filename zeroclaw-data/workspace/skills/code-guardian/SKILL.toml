[skill]
name = "code-guardian"
description = "Protege el sistema de código defectuoso y configuraciones inválidas."
version = "2.0.0"
author = "zeroclaw"
tags = ["protection", "validation", "safety"]

[[tools]]
name = "check_gateway"
description = "Check zeroclaw gateway health"
kind = "shell"
command = "curl -s http://localhost:${PORT:-42617}/health"

[[tools]]
name = "validate_config"
description = "Validate config.toml syntax"
kind = "shell"
command = "python3 -c 'import tomllib; tomllib.load(open(\"/zeroclaw-data/.zeroclaw/config.toml\", \"rb\"))' && echo 'Config OK' || echo 'Config INVALID'"

[[tools]]
name = "check_memory_backend"
description = "Check memory backend status"
kind = "shell"
command = "ls -la /zeroclaw-data/.zeroclaw/ | grep -E 'memory|brain|sqlite' || echo 'No memory DB found'"

[[tools]]
name = "backup_config"
description = "Create config backup"
kind = "shell"
command = "cp /zeroclaw-data/.zeroclaw/config.toml /zeroclaw-data/.zeroclaw/config.toml.bak.$(date +%Y%m%d%H%M%S) && echo 'Backup created'"

[[tools]]
name = "restore_config"
description = "Restore config from backup"
kind = "shell"
command = "ls -t /zeroclaw-data/.zeroclaw/config.toml.bak* | head -1 | xargs -I {} cp {} /zeroclaw-data/.zeroclaw/config.toml && echo 'Restored'"