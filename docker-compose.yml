# ZeroClaw Enterprise Docker Compose
#
# Quick start:
#   1. Set your API keys in .env file
#   2. Run: docker compose up -d
#   3. Access gateway at http://localhost:42617

services:
  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: zeroclaw:local
    container_name: zeroclaw-enterprise
    restart: unless-stopped
    command: ["daemon"]
    environment:
      # Required: Your LLM provider API key
      - API_KEY=${OPENAI_API_KEY:-}
      # Provider (default: openrouter)
      - PROVIDER=${PROVIDER:-openrouter}
      - ZEROCLAW_MODEL=${ZEROCLAW_MODEL:-openrouter/free}
      # Gateway
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_GATEWAY_HOST=0.0.0.0
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Notion
      - NOTION_KEY=${NOTION_KEY:-}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Logging
      - RUST_LOG=info
      - RUST_BACKTRACE=1

    volumes:
      - ./zeroclaw-data/.zeroclaw:/zeroclaw-data/.zeroclaw
      - zeroclaw-data:/zeroclaw-data

    ports:
      - "${HOST_PORT:-42617}:42617"

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

    healthcheck:
      test: ["CMD", "zeroclaw", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  zeroclaw-data: